name: qtaim_embed
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - rdkit
  # pymatgen 2026.5.x split into a `pymatgen-core` distribution that drops
  # `pymatgen.core.composition` etc. -- avoid until they stabilize.
  - pymatgen<2026.5
  - lmdb
  - pip
  - mkl
  # pytorch 2.11 from pkgs/main with cuda 13.0 build matches system driver (CUDA 13.0)
  # use cuda 12.9 build (gpu_cuda129_*) on hosts with older drivers
  - pytorch=2.11.0=gpu_cuda130*
  - scikit-learn
  - ase
  - lightning>=2.4
  - pytables
  - pygments
  - numpy>=2.0
  # pulled in for qtaim_generator parity (shared env)
  - pyarrow
  - tqdm
  - pip:
      - bson
      - pandas
      - pytest
      # lmdb >= 2.0 forbids opening the same env path twice in one process,
      # which both repos rely on across test fixtures. Pin until both code
      # paths are refactored.
      - lmdb<2
      - e3nn
      - torch-geometric==2.7.0
      - wandb
      - tensorboard
      - seaborn
    # keep pip-only extras here if needed
